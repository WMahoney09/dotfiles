# Paddy Grizzly — catppuccin @thm_* variable mapping
# Ported from https://github.com/yl92/paddy-color-theme
#
# Maps Grizzly's palette to catppuccin/tmux's variable interface so the
# structural engine (powerline, status modules, window tabs) renders in
# Grizzly colors.

# Base
set -gq @thm_bg "#201612"
set -gq @thm_fg "#f1bc94"

# Mantle / Crust (darkened anchors below bg)
set -gq @thm_crust "#150e0a"
set -gq @thm_mantle "#1a120e"

# Surfaces (dark → light)
set -gq @thm_surface_0 "#3c312d"
set -gq @thm_surface_1 "#4b4138"
set -gq @thm_surface_2 "#5a5048"

# Overlays (UI borders, subtle highlights)
set -gq @thm_overlay_0 "#6a6058"
set -gq @thm_overlay_1 "#7a7068"
set -gq @thm_overlay_2 "#8a8078"

# Subtext (muted text shades)
set -gq @thm_subtext_0 "#b09a8a"
set -gq @thm_subtext_1 "#c8b4a4"

# Accent colors
set -gq @thm_red "#da2811"
set -gq @thm_maroon "#fd4931"
set -gq @thm_peach "#ff9029"
set -gq @thm_yellow "#ffb618"
set -gq @thm_green "#399227"
set -gq @thm_teal "#08a087"
set -gq @thm_sky "#1bdfbe"
set -gq @thm_sapphire "#3a89d3"
set -gq @thm_blue "#3465a5"
set -gq @thm_lavender "#6dddbb"
set -gq @thm_mauve "#c40b48"
set -gq @thm_pink "#ff3c7d"
set -gq @thm_flamingo "#f1bc94"
set -gq @thm_rosewater "#fae8e0"
