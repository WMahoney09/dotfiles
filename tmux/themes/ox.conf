# Paddy Ox — catppuccin @thm_* variable mapping
# Ported from https://github.com/yl92/paddy-color-theme
#
# Maps Ox's palette to catppuccin/tmux's variable interface so the
# structural engine (powerline, status modules, window tabs) renders in
# Ox colors.

# Base
set -gq @thm_bg "#1f0c0f"
set -gq @thm_fg "#ecaf87"

# Mantle / Crust (darkened anchors below bg)
set -gq @thm_crust "#140709"
set -gq @thm_mantle "#190a0c"

# Surfaces (dark → light)
set -gq @thm_surface_0 "#332726"
set -gq @thm_surface_1 "#4d3232"
set -gq @thm_surface_2 "#5c4242"

# Overlays (UI borders, subtle highlights)
set -gq @thm_overlay_0 "#6c5252"
set -gq @thm_overlay_1 "#7c6262"
set -gq @thm_overlay_2 "#8c7272"

# Subtext (muted text shades)
set -gq @thm_subtext_0 "#a89090"
set -gq @thm_subtext_1 "#c4abab"

# Accent colors
set -gq @thm_red "#bc1600"
set -gq @thm_maroon "#ff2e13"
set -gq @thm_peach "#ff6550"
set -gq @thm_yellow "#ffc918"
set -gq @thm_green "#39a150"
set -gq @thm_teal "#29ad97"
set -gq @thm_sky "#60dec9"
set -gq @thm_sapphire "#62b2e4"
set -gq @thm_blue "#4075a7"
set -gq @thm_lavender "#60dec9"
set -gq @thm_mauve "#d0245e"
set -gq @thm_pink "#ef4980"
set -gq @thm_flamingo "#ecaf87"
set -gq @thm_rosewater "#fae8e0"
