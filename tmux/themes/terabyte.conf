# Paddy Terabyte — catppuccin @thm_* variable mapping
# Ported from https://github.com/yl92/paddy-color-theme
#
# Maps Terabyte's palette to catppuccin/tmux's variable interface so the
# structural engine (powerline, status modules, window tabs) renders in
# Terabyte colors.

# Base
set -gq @thm_bg "#0b1a1a"
set -gq @thm_fg "#e6d4b2"

# Mantle / Crust (darkened anchors below bg)
set -gq @thm_crust "#061211"
set -gq @thm_mantle "#081514"

# Surfaces (dark → light)
set -gq @thm_surface_0 "#243d36"
set -gq @thm_surface_1 "#406662"
set -gq @thm_surface_2 "#4d7a6e"

# Overlays (UI borders, subtle highlights)
set -gq @thm_overlay_0 "#5a8d7c"
set -gq @thm_overlay_1 "#6a9d8c"
set -gq @thm_overlay_2 "#7aad9c"

# Subtext (muted text shades)
set -gq @thm_subtext_0 "#98c4b0"
set -gq @thm_subtext_1 "#b8dcc8"

# Accent colors
set -gq @thm_red "#a94133"
set -gq @thm_maroon "#e46857"
set -gq @thm_peach "#63c888"
set -gq @thm_yellow "#ffcb2f"
set -gq @thm_green "#3bce16"
set -gq @thm_teal "#6cffbd"
set -gq @thm_sky "#c0ffe6"
set -gq @thm_sapphire "#68bbdb"
set -gq @thm_blue "#4a89ad"
set -gq @thm_lavender "#c0ffe6"
set -gq @thm_mauve "#cb3e43"
set -gq @thm_pink "#f3777b"
set -gq @thm_flamingo "#e6d4b2"
set -gq @thm_rosewater "#faece0"
