# Paddy Frost — catppuccin @thm_* variable mapping
# Ported from https://github.com/yl92/paddy-color-theme
#
# Light theme: maps Frost's palette to catppuccin/tmux's variable interface.
# Depth progression is inverted vs dark themes (crust/mantle darker than bg).

# Base
set -gq @thm_bg "#f6faf8"
set -gq @thm_fg "#186554"

# Mantle / Crust (tinted anchors below bg — darker for light themes)
set -gq @thm_crust "#d3e4e1"
set -gq @thm_mantle "#e3f0ee"

# Surfaces (progressively darker)
set -gq @thm_surface_0 "#bfdad7"
set -gq @thm_surface_1 "#a8c8c2"
set -gq @thm_surface_2 "#90b5ae"

# Overlays (UI borders, subtle highlights)
set -gq @thm_overlay_0 "#78a29a"
set -gq @thm_overlay_1 "#608f86"
set -gq @thm_overlay_2 "#4a7c72"

# Subtext (muted text shades)
set -gq @thm_subtext_0 "#346960"
set -gq @thm_subtext_1 "#245a50"

# Accent colors
set -gq @thm_red "#b61702"
set -gq @thm_maroon "#d43e2a"
set -gq @thm_peach "#098a3a"
set -gq @thm_yellow "#d37d0d"
set -gq @thm_green "#068020"
set -gq @thm_teal "#08a087"
set -gq @thm_sky "#1bdfbe"
set -gq @thm_sapphire "#3a89d3"
set -gq @thm_blue "#3465a5"
set -gq @thm_lavender "#1aa572"
set -gq @thm_mauve "#c40b48"
set -gq @thm_pink "#ff246d"
set -gq @thm_flamingo "#b37570"
set -gq @thm_rosewater "#cc894b"
