# Paddy Citadel — catppuccin @thm_* variable mapping
# Ported from https://github.com/yl92/paddy-color-theme
#
# Maps Citadel's palette to catppuccin/tmux's variable interface so the
# structural engine (powerline, status modules, window tabs) renders in
# Citadel colors.

# Base
set -gq @thm_bg "#092630"
set -gq @thm_fg "#e3b19d"

# Mantle / Crust (darkened anchors below bg)
set -gq @thm_crust "#051a22"
set -gq @thm_mantle "#071e28"

# Surfaces (dark → light)
set -gq @thm_surface_0 "#205263"
set -gq @thm_surface_1 "#215769"
set -gq @thm_surface_2 "#2a6a7d"

# Overlays (UI borders, subtle highlights)
set -gq @thm_overlay_0 "#3a7a8d"
set -gq @thm_overlay_1 "#4a8a9d"
set -gq @thm_overlay_2 "#5a9aad"

# Subtext (muted text shades)
set -gq @thm_subtext_0 "#8fbcb0"
set -gq @thm_subtext_1 "#b3d4c8"

# Accent colors
set -gq @thm_red "#ff4128"
set -gq @thm_maroon "#ff5a44"
set -gq @thm_peach "#eba31c"
set -gq @thm_yellow "#ffd54c"
set -gq @thm_green "#14ad35"
set -gq @thm_teal "#03b698"
set -gq @thm_sky "#03d6dd"
set -gq @thm_sapphire "#8febf2"
set -gq @thm_blue "#509fff"
set -gq @thm_lavender "#4bccb7"
set -gq @thm_mauve "#db0f8d"
set -gq @thm_pink "#ff46c8"
set -gq @thm_flamingo "#e3b19d"
set -gq @thm_rosewater "#fae8e0"
