# ─── PREFIX ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── TERMINAL & COLORS ───────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"

# ─── GENERAL ─────────────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g status-interval 15

# ─── MOUSE ───────────────────────────────────────────────────────────────────
set -g mouse on

# ─── CLIPBOARD (macOS) ──────────────────────────────────────────────────────
set -s copy-command "pbcopy"
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel

# ─── PANE NAVIGATION (vim-style) ─────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── PANE SPLITTING ──────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ─── RELOAD ─────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ─── THEME ───────────────────────────────────────────────────────────────────
# Priority: PROJECT_THEME env var → ~/.config/current-theme file → citadel.
# Paddy themes load from ~/.tmux.conf.d/themes/; catppuccin flavors from plugin.
run-shell '\
  if [ -n "$PROJECT_THEME" ]; then \
    theme="$PROJECT_THEME"; \
  elif [ -f "$HOME/.config/current-theme" ]; then \
    theme=$(cat "$HOME/.config/current-theme"); \
  else \
    theme="citadel"; \
  fi; \
  if [ -f "$HOME/.tmux.conf.d/themes/$theme.conf" ]; then \
    tmux source-file "$HOME/.tmux.conf.d/themes/$theme.conf"; \
  else \
    tmux set -g @catppuccin_flavor "$theme"; \
  fi'

# Window styling
set -g @catppuccin_window_text "#W#{?window_zoomed_flag, #[bg=#{@thm_peach}]#[fg=#{@thm_bg}] 󰁌 ,}"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag, #[bg=#{@thm_peach}]#[fg=#{@thm_bg}] 󰁌 ,}"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_number_color "#{@thm_lavender}"
set -g @catppuccin_window_current_number_color "#{@thm_peach}"

# Pane borders
set -g @catppuccin_pane_border_style "fg=#{@thm_overlay_0}"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_lavender}"

# ─── TPM (Tmux Plugin Manager) ──────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

run '~/.tmux/plugins/tpm/tpm'

# ─── PANE THEMING ──────────────────────────────────────────────────────────
set -gF window-style "bg=#{@thm_bg},fg=#{@thm_fg}"
set -gF window-active-style "bg=#{@thm_bg},fg=#{@thm_fg}"

# ─── STATUS BAR (must come after plugin load) ───────────────────────────────
# Powerline-style segments with rounded separators (U+E0B4 / U+E0B6)
# Matches the Claude Code statusline aesthetic using @thm_* colors
set -g status-left-length 100
set -g status-right-length 150
set -g status-left ""
set -g status-right "#[bg=#{@thm_mantle},fg=#{@thm_fg}]  #{b:pane_current_path} #[fg=#{@thm_mantle},bg=#{?client_prefix,#{@thm_red},#{@thm_green}}]#[fg=#{@thm_crust}]  #S #[bg=default,fg=#{?client_prefix,#{@thm_red},#{@thm_green}}]"

# ─── THEME SWITCHER (prefix + T) ────────────────────────────────────────────
bind T display-popup -E '\
  theme=$(printf "citadel\nfrost\ngrizzly\nox\nterabyte\nmocha\nmacchiato\nfrappe\nlatte" | fzf --prompt="theme: ") && \
  echo "$theme" > ~/.config/current-theme && \
  case "$theme" in \
    mocha) ghostty_theme="Catppuccin Mocha" ;; \
    macchiato) ghostty_theme="Catppuccin Macchiato" ;; \
    frappe) ghostty_theme="Catppuccin Frappe" ;; \
    latte) ghostty_theme="Catppuccin Latte" ;; \
    *) ghostty_theme="$theme" ;; \
  esac && \
  sed -i "" "s/^theme = .*/theme = $ghostty_theme/" ~/.config/ghostty/config && \
  if [ -f "$HOME/.tmux.conf.d/themes/${theme}.conf" ]; then \
    tmux source "$HOME/.tmux.conf.d/themes/${theme}.conf"; \
  else \
    tmux set -g @catppuccin_flavor "$theme" && \
    sed "s/set -ogq/set -gq/" ~/.tmux/plugins/tmux/themes/catppuccin_${theme}_tmux.conf | tmux source /dev/stdin; \
  fi && \
  tmux source ~/.tmux/plugins/tmux/catppuccin_tmux.conf && \
  tmux set -gF window-style "bg=#{@thm_bg},fg=#{@thm_fg}" && \
  tmux set -gF window-active-style "bg=#{@thm_bg},fg=#{@thm_fg}" && \
  tmux set -g status-left "" && \
  tmux set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_session}" && \
  tmux display-message "Theme: $theme (⌘⇧, to reload Ghostty)"'
