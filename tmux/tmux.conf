# ─── PREFIX ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── TERMINAL & COLORS ───────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"

# ─── GENERAL ─────────────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on

# ─── MOUSE ───────────────────────────────────────────────────────────────────
set -g mouse on

# ─── CLIPBOARD (macOS) ──────────────────────────────────────────────────────
set -s copy-command "pbcopy"
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel

# ─── PANE NAVIGATION (vim-style) ─────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── PANE SPLITTING ──────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ─── RELOAD ─────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ─── THEME ───────────────────────────────────────────────────────────────────
# Default: citadel. Use theme switcher (prefix + T) or PROJECT_THEME env var
# to override. Supported values: mocha, macchiato, frappe, latte, citadel
if-shell '[ -n "$PROJECT_THEME" ] && [ "$PROJECT_THEME" != "citadel" ]' \
  'set -g @catppuccin_flavor "$PROJECT_THEME"' \
  'source-file ~/.tmux.conf.d/themes/citadel.conf'

# Window styling
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_current_number_color "#{@thm_lavender}"

# Pane borders
set -g @catppuccin_pane_border_style "fg=#{@thm_overlay_0}"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_lavender}"

# ─── TPM (Tmux Plugin Manager) ──────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

run '~/.tmux/plugins/tpm/tpm'

# ─── PANE THEMING ──────────────────────────────────────────────────────────
set -gF window-style "bg=#{@thm_bg},fg=#{@thm_fg}"
set -gF window-active-style "bg=#{@thm_bg},fg=#{@thm_fg}"

# ─── STATUS BAR (must come after plugin load) ───────────────────────────────
set -g status-left-length 100
set -g status-right-length 150
set -g status-left ""
set -g status-right "#(~/.tmux/scripts/claude-context.sh)"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

set -g @catppuccin_date_time_text "%H:%M %d-%b"

# ─── THEME SWITCHER (prefix + T) ────────────────────────────────────────────
bind T display-popup -E '\
  theme=$(printf "mocha\nmacchiato\nfrappe\nlatte\ncitadel" | fzf --prompt="theme: ") && \
  if [ "$theme" = "citadel" ]; then \
    tmux source ~/.tmux.conf.d/themes/citadel.conf; \
  else \
    tmux set -g @catppuccin_flavor "$theme" && \
    sed "s/set -ogq/set -gq/" ~/.tmux/plugins/tmux/themes/catppuccin_${theme}_tmux.conf | tmux source /dev/stdin; \
  fi && \
  tmux source ~/.tmux/plugins/tmux/catppuccin_tmux.conf && \
  tmux set -gF window-style "bg=#{@thm_bg},fg=#{@thm_fg}" && \
  tmux set -gF window-active-style "bg=#{@thm_bg},fg=#{@thm_fg}" && \
  tmux set -g status-left "" && \
  tmux set -g status-right "#(~/.tmux/scripts/claude-context.sh)#{E:@catppuccin_status_directory}#{E:@catppuccin_status_session}#{E:@catppuccin_status_date_time}" && \
  tmux display-message "Theme: $theme"'
